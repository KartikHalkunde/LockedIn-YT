---
name: Bug Report 
description: Create a bug report to help improve LockedIn
title: '[BUG] '
labels: [bug]
assignees: 
  - KartikHalkunde
body:

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist - Required"
      description: |
        **READ CAREFULLY:** You must complete these checks before submitting. Failing to do so will result in your issue being closed immediately.

        **Duplicate issues = Instant closure with no response**
      options:
        - label: " I've checked that there is NO open or closed issue about this bug. (Duplicate issues will be closed immediately without response)"
          required: true
        - label: " This issue contains only ONE bug. PLEASE check pinned issues before opening a new one."
          required: true
        - label: " The title of this issue accurately describes the bug."
          required: true
        - label: " The entire issue report is written/translated in English."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## Bug Details

  - type: textarea
    id: reproduce-steps
    attributes:
      label: Steps to reproduce the bug
      description: What did you do for the bug to show up?
      placeholder: |
        Example:
          1. Go to '...'
          2. Click on '....'
          3. Scroll down to '....'
          4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      placeholder: |
        Example:
          "This should happen..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      placeholder: |
        Example:
          "This happened instead..."
    validations:
      required: true

  - type: textarea
    id: sreen-media
    attributes:
      label: Screenshots/Screen recordings
      description: |
        A picture or video helps us understand the bug more.

        You can upload them directly in the text box.

  - type: input
    id: extension-version
    attributes:
      label: LockedIn version
      description: |
        You can find the LockedIn version in **Popup footer**.
      placeholder: |
        Example: "1.0.67"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser 
      description: |
        Which Browser were you using.
      placeholder: |
        Example: "Firefox/MS Edge/Chrome"
    validations:
      required: true

  - type: input
    id: OS
    attributes:
      label: Operating System 
      description: |
        What operating system are you on.
      placeholder: |
        Example: "Windows 11/macOS/Linux(DISTRO)"
    validations:
      required: true

  - type: textarea
    id: additional-information
    attributes:
      label: Additional information
      placeholder: |
        Additional details and attachments.